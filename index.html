<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوسف | بورتفوليو الفيديوهات الإعلانية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <h2>العدسة <span>السينمائية</span></h2>
        </div>
        <ul class="nav-links">
            <li><a href="#portfolio">معرض الأعمال</a></li>
            <li><a href="contact.html" class="contact-btn">تواصل معنا</a></li>
        </ul>
    </nav>

    <header class="hero">
        <video autoplay loop muted playsinline class="back-video">
            <source src="video/showreel.mp4" type="video/mp4">
        </video>
        
        <div class="hero-content">
            <h1>نصنع لك صورة بصرية تليق بمكانة علامتك التجارية</h1>
            <p>من الفكرة إلى الشاشة، حلولاً إعلانية متكاملة تبرز أدق تفاصيل المنتج وتصنع الفارق.</p>
            <a href="#portfolio" class="btn-primary">استكشف أعمالنا</a>
        </div>
    </header>

    <section id="portfolio" class="portfolio">
        <div class="section-title">
            <h2>سابقة أعمالنا</h2>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="restaurants">مطاعم</button>
            <button class="filter-btn" data-filter="gold">ذهب ومجوهرات</button>
        </div>

        <div class="portfolio-grid">
            
            <div class="portfolio-item restaurants" data-video="video/restaurant-1.mp4">
                <img src="images/restaurant-thumb.jpg" alt="إعلان مطعم">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                </div>
            </div>

            <div class="portfolio-item gold" data-video="video/gold-1.mp4">
                <img src="images/gold-thumb.jpg" alt="إعلان مجوهرات">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                </div>
            </div>

            </div>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026.</p>
    </footer>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-content">
            <video id="lightbox-video" controls playsinline>
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
