<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html"><h2>العدسة <span>السينمائية</span></h2></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="index.html#portfolio">معرض الأعمال</a></li>
        </ul>
    </nav>

    <section class="contact-page">
        <div class="section-title">
            <h2>يلا نبدأ شغل؟</h2>
            <p>ابعتلنا رسالة وهنرد عليك في أقرب وقت</p>
        </div>

        <div class="contact-container">
            
            <div class="contact-info">
                <h3>طرق التواصل المباشر</h3>
                <p>عايز تنجز؟ أسرع طريقة للرد هي الواتساب.</p>
                
                <a href="https://wa.me/97477637617" target="_blank" class="whatsapp-btn">💬 كلمني واتساب</a>
                
                <div class="social-icons">
                    <a href="https://www.instagram.com/cse.ahmedashour?igsh=MXZjOTQwam50ZzlmMA==" target="_blank">Instagram</a>
                    <a href="#" target="_blank">YouTube</a>
                </div>
            </div>

            <div class="contact-form">
                <form name="contact" method="POST" data-netlify="true">
                    <input type="text" name="name" placeholder="اسمك أو اسم المكان (المطعم/المحل)" required>
                    <input type="tel" name="phone" placeholder="رقم التليفون / الواتساب" required>
                    <textarea name="message" rows="5" placeholder="تفاصيل الإعلان اللي محتاجه..." required></textarea>
                    <button type="submit">ابعت الرسالة</button>
                </form>
            </div>

        </div>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 العدسة السينمائية.</p>
    </footer>

</body>
